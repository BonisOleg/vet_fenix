services:
  nginx:
    restart: always
    ports:
      - "443:443"
    volumes:
      - ./deploy/nginx/docker.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

  backend:
    restart: always
    env_file:
      - .env

  db:
    restart: always
    env_file:
      - .env
