{% load i18n %}

{% if site_icon %}
    <div class="admin-site-icon shrink-0">
        <a href="{% url "admin:index" %}" class="admin-site-icon__link">
            {% if site_icon.light and site_icon.dark %}
                <img src="{{ site_icon.dark }}" alt="{% trans 'Home' %}" class="admin-site-icon__img hidden dark:block"/>

                <img src="{{ site_icon.light }}" alt="{% trans 'Home' %}" class="admin-site-icon__img block dark:hidden" />
            {% else %}
                <img src="{{ site_icon }}" class="admin-site-icon__img" alt="{% trans 'Home' %}" />
            {% endif %}
        </a>
    </div>
{% else %}
    <a href="{% url "admin:index" %}" class="admin-site-icon admin-site-icon--fallback bg-primary-600 flex items-center justify-center rounded text-white text-xs">
        <span class="material-symbols-outlined md-18">{% if site_symbol %}{{ site_symbol }}{% else %}settings{% endif %}</span>
    </a>
{% endif %}

<div class="admin-site-branding flex flex-col grow justify-center min-w-0">
    <a href="{% url "admin:index" %}" class="admin-site-branding__title">
        {{ site_header|default:branding }}
    </a>

    {% if site_subheader %}
        <div class="admin-site-branding__subtitle">
            {{ site_subheader }}
        </div>
    {% endif %}
</div>
