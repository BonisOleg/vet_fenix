{% load vet_icons %}
{% if site_nav_bottom %}
<nav
  class="bottom-nav bottom-nav--count-{{ site_nav_bottom|length }}"
  aria-label="Мобільна навігація"
>
  {% for item in site_nav_bottom %}
  <a href="{% url item.url_name %}" class="tab {% if active_nav == item.nav_id %}active{% endif %}">
    <span class="nav-ico">{% icon item.icon 20 %}</span>
    <span class="bottom-nav__label">{{ item.label }}</span>
  </a>
  {% endfor %}
</nav>
{% endif %}
